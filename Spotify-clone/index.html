<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="utility.css">
    <title>Spotify-Clone</title>
</head>

<body>
    <div class="main border">
        <div class="top flex items-align">
            <div class="Slogo">
                <a href="">
                    <img src="./svg/logo.svg" class="invert" width="32px" alt="">
                </a>
            </div>
            <div class="searchbar p-inline" style="display: inline-flex;">
                <div class="home base-color">
                    <button class="homebtn">
                        <img src="./svg/home.svg" class="invert svg-width" alt="">
                    </button>
                </div>
                <div class="searchinp base-color">
                    <form action="" class="flex items-align">
                        <button class="searchbtn base-color">
                            <img src="./svg/search.svg" class="invert svg-width" alt="">
                        </button>
                        <div class="inp">
                            <input aria-label="Find your Song here!" type="text" placeholder="Find your Song here!">
                        </div>
                        <button class="Browse base-color">
                            <img src="./svg/browse.svg" class="invert">
                        </button>

                    </form>
                </div>
            </div>
            <div class="empty"></div>
            <div class="top-left flex items-align justify-center">
                <div class="top-left-1">
                    <div>Premium</div>
                    <div>Support</div>
                    <div>Download</div>
                </div>
                <span style="background: #fff; width: 1px; height: 25px; margin: 16px;"></span>
                <div class="top-left-2">
                    <div><a href=""><span>
                        <img src="./svg/Slash.svg" class="invert items-align" style="width: 16px; height: 16px; display: flex;" alt="">
                    </span>Install app</a></div>
                    <div><a href="">Sign up</a></div>
                    <div><a href="">Log in</a></div>
                </div>
            </div>
        </div>

        <div class="cnt flex">
            <div class="left base-color border">LeftSideBar</div>
            <div class="right base-color  border">RightSideBar</div>
        </div>
    </div>
</body>

</html>
